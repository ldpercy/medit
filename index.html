<!doctype html>
<html lang="en" data-colourscheme="light">
<head>
	<title>Medit v0.1.0 by ldpercy</title>
	<meta charset="utf-8">
	<meta name="description" content="medit v0.1.0 by ldpercy">
	<link rel="icon" href="./favicon.svg"/>
	<link rel="stylesheet" href="./index.css"/>
	<script  type="module"  src="./index.js"></script>

	<meta name="color-scheme" content="light dark">
	<meta name="theme-color" content="hsl(178, 60%, 80%)" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="hsl(178, 60%, 20%)" media="(prefers-color-scheme: dark)" />
	<!-- i dont think the above will work, but will give it a try -->
</head>
<body>

	<header>

		<form id="form-application" name="application" tabindex="0"> <!--  class="ui-panel" -->
			<h1>Medit</h1>
			<fieldset class="flex1">
				<label title="Light scheme">
					<input type="radio" name="colourScheme" value="light" class="colourScheme-selector" data-colourscheme="light" checked>
					light
				</label>
				<label title="Dark scheme">
					<input type="radio" name="colourScheme" value="dark" class="colourScheme-selector" data-colourscheme="dark">
					dark
				</label>
			</fieldset>

			<button type="button" id="button-showAppInfo"><strong>🛈 Medit help</strong></button>


			<input type="file" name="fileinput" id="input-loadfile" accept="text/*,.svg,.sh,.xml,.css,.js,.json,.md">

			<button type="button" id="button-save">save</button>
			<a name="downloadAnchor" id="download-anchor" download="_medit.md" href="" style="display:none;">download anchor</a>


		</form>

	</header>

	<main id="main-document-area">
		<!-- main
		-->
		<form name="document-form">
		<textarea id="main-textarea" name="main-textarea">
			Welcome to Medit
			================

			Hope this works!!!
		</textarea>
		</form>

	</main>

	<dialog id="dialog-appInfo" closedby="any">
		<h1>
			<a href="https://github.com/ldpercy/medit/">Medit</a>
			<a href="https://github.com/ldpercy/medit/releases/tag/v0.1.0">v0.1.0</a>
			by <a href="https://github.com/ldpercy/">ldpercy</a>
		</h1>

		<h2>Keyboard shortcuts</h2>
		<dl>
			<dt><kbd>?</kbd></dt>
			<dd>Show this dialog</dd>
		</dl>


	</dialog>


</body>
</html>
